<nx-formfield [label]="label()">
  <nx-dropdown [value]="value()" (valueChange)="valueChange.emit($event)">
    @for (option of options(); track option) {
      <nx-dropdown-item [value]="option">{{ option }}</nx-dropdown-item>
    }
  </nx-dropdown>
</nx-formfield>
@if (error()) {
  <nx-error nxFormfieldError [showIcon]="true">{{ error() }}</nx-error>
}
